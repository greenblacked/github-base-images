    needs: build-go
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ci-go125
      VERSION: bookworm-v1

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ env.IMAGE }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          # shellcheck disable=SC2035,SC2046 # the digest filenames must word-split
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}:${{ env.VERSION }} \
            --tag ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}:latest \
            --tag ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}:${{ github.sha }} \
            $(printf 'ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}@sha256:%s ' *)

