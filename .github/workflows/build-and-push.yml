          digest=$(echo "$inspect" | awk '/^Digest:/ {print $2; exit}')
          {
            echo "### ${{ env.IMAGE }}:${{ env.VERSION }}"
            echo
            echo "Tested and scanned on every architecture. Pin this digest in production:"
            echo
            echo '```yaml'
            echo "image: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}@${digest}"
            echo '```'
            echo
            echo '```'
            echo "$inspect"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------------
  # ci-go125 -- same structure as ci-node22 above; see the comments there.
  # ------------------------------------------------------------------------
  build-go:
    needs: [lint, mirror]
    if: ${{ !cancelled() && needs.lint.result == 'success' && (needs.mirror.result == 'success' || needs.mirror.result == 'skipped') }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ci-go125
      VERSION: bookworm-v1
      MIRROR: mirror-golang:1.25-bookworm
      UPSTREAM: golang:1.25-bookworm

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ env.IMAGE }} (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.IMAGE }}
          file: ./${{ env.IMAGE }}/${{ env.DOCKERFILE }}
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_IMAGE=${{ (github.event_name == 'pull_request' || github.ref != 'refs/heads/main') && env.UPSTREAM || format('ghcr.io/{0}/{1}', github.repository_owner, env.MIRROR) }}
          load: true
          push: false
          tags: ${{ env.IMAGE }}:test
          cache-from: type=gha,scope=${{ env.IMAGE }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE }}-${{ matrix.arch }}

      - name: Smoke test (${{ matrix.arch }})
